# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    # Let new action versions settle for 7 days before opening a PR (same as HA Core)
    cooldown:
      default-days: 7
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"


  - package-ecosystem: "pip"
    directory: "/"
    # Let patch releases settle 3 days, minor releases 7 days before opening a PR
    cooldown:
      semver-patch-days: 3
      semver-minor-days: 7
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Dependabot should not update Home Assistant as that should match the homeassistant key in hacs.json
      - dependency-name: "homeassistant"
      - dependency-name: "pytest-homeassistant-custom-component"
    groups:
      # Bundle all minor/patch Python dep updates into a single PR; major updates stay separate.
      # pytest-homeassistant-custom-component is intentionally excluded and ignored above,
      # because it is updated manually together with hacs.json "homeassistant".
      python-dependencies:
        applies-to: version-updates
        update-types:
          - minor
          - patch
        exclude-patterns:
          - "pytest-homeassistant-custom-component"
